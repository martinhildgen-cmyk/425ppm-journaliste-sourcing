<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>425PPM Sourcing</title>
  <style>
    :root {
      --green: #22c55e;
      --red: #ef4444;
      --gray: #6b7280;
      --bg: #f9fafb;
      --card: #ffffff;
      --text: #111827;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      min-width: 300px;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
    }
    .status-dot.connected {
      background: var(--green);
    }
    .counters {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--gray);
    }
    .counter-value {
      font-weight: 600;
      font-size: 20px;
      color: var(--text);
    }
    button#captureBtn {
      width: 100%;
      padding: 10px 16px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    button#captureBtn:hover {
      opacity: 0.9;
    }
    button#captureBtn:disabled {
      background: var(--gray);
      cursor: not-allowed;
    }
    .settings label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .settings button {
      padding: 6px 12px;
      font-size: 12px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>425PPM Sourcing</h1>

  <!-- Connection status -->
  <div class="card">
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </div>

  <!-- Rate limiter counters -->
  <div class="card">
    <div class="counters">
      <div>
        <div class="counter-value" id="hourCount">0</div>
        <div>cette heure (max 30)</div>
      </div>
      <div>
        <div class="counter-value" id="dayCount">0</div>
        <div>aujourd'hui (max 100)</div>
      </div>
    </div>
  </div>

  <!-- Capture button -->
  <button id="captureBtn">Capturer ce profil</button>

  <!-- Settings -->
  <div class="card settings">
    <label for="apiUrlInput">API URL</label>
    <input type="url" id="apiUrlInput" placeholder="http://localhost:3000" />
    <label for="authTokenInput">Auth Token</label>
    <input type="password" id="authTokenInput" placeholder="Bearer token" />
    <button id="saveSettingsBtn">Enregistrer</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
