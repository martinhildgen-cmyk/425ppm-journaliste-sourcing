<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>425PPM Sourcing</title>
  <style>
    :root {
      --green: #22c55e;
      --red: #ef4444;
      --gray: #6b7280;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --bg: #f9fafb;
      --card: #ffffff;
      --text: #111827;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      min-width: 300px;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
    }
    .status-dot.connected {
      background: var(--green);
    }
    .counters {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--gray);
    }
    .counter-value {
      font-weight: 600;
      font-size: 20px;
      color: var(--text);
    }

    /* Selector alert */
    .selector-alert {
      display: none;
      background: #fef3c7;
      border: 1px solid var(--orange);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #92400e;
      margin-bottom: 12px;
    }

    /* Client / Campaign / Tags */
    .form-group {
      margin-bottom: 10px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      margin-bottom: 4px;
    }
    .form-group select,
    .form-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      background: var(--card);
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: var(--green);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-secondary {
      background: var(--blue);
      color: #fff;
    }
    .btn-secondary:hover:not(:disabled) { opacity: 0.9; }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-outline:hover:not(:disabled) { background: var(--bg); }

    /* Bulk section */
    .bulk-section {
      display: none;
    }
    .bulk-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .bulk-actions .btn {
      flex: 1;
      margin-bottom: 0;
      font-size: 12px;
      padding: 8px 10px;
    }
    .bulk-count {
      font-size: 12px;
      color: var(--gray);
      text-align: center;
    }
    .bulk-count strong {
      color: var(--text);
    }

    /* Feedback */
    .feedback {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .feedback.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }
    .feedback.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
    .feedback.info {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }

    /* Settings */
    .settings label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .settings button {
      padding: 6px 12px;
      font-size: 12px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <h1>425PPM Sourcing</h1>

  <!-- Feedback -->
  <div class="feedback" id="feedback"></div>

  <!-- Selector alert -->
  <div class="selector-alert" id="selectorAlert"></div>

  <!-- Connection status -->
  <div class="card">
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Deconnecte</span>
    </div>
  </div>

  <!-- Rate limiter counters -->
  <div class="card">
    <div class="counters">
      <div>
        <div class="counter-value" id="hourCount">0</div>
        <div>cette heure (max 30)</div>
      </div>
      <div>
        <div class="counter-value" id="dayCount">0</div>
        <div>aujourd'hui (max 100)</div>
      </div>
    </div>
  </div>

  <!-- Client / Campaign / Tags -->
  <div class="card">
    <div class="form-group">
      <label for="clientSelect">Client</label>
      <select id="clientSelect">
        <option value="">— Aucun client —</option>
      </select>
    </div>
    <div class="form-group">
      <label for="campaignSelect">Campagne</label>
      <select id="campaignSelect" style="display: none;">
        <option value="">— Aucune campagne —</option>
      </select>
    </div>
    <div class="form-group">
      <label for="tagsInput">Tags (separees par des virgules)</label>
      <input type="text" id="tagsInput" placeholder="tech, startup, IA" />
    </div>
  </div>

  <!-- Single capture button -->
  <button class="btn btn-primary" id="captureBtn">Capturer ce profil</button>

  <!-- URL Import (degraded mode) -->
  <button class="btn btn-outline" id="urlImportBtn">Importer par URL (mode degrade)</button>

  <!-- Bulk section (search pages only) -->
  <div class="bulk-section" id="bulkSection">
    <div class="divider"></div>
    <h2>Capture en masse</h2>
    <div class="card">
      <div class="bulk-actions">
        <button class="btn btn-secondary" id="injectCheckboxesBtn">Afficher checkboxes</button>
        <button class="btn btn-primary" id="captureBulkBtn">Capturer la selection</button>
      </div>
      <div class="bulk-count">
        <strong id="bulkSelectedCount">0</strong> profil(s) selectionne(s)
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Settings -->
  <div class="card settings">
    <h2>Parametres</h2>
    <label for="apiUrlInput">API URL</label>
    <input type="url" id="apiUrlInput" placeholder="http://localhost:8000" />
    <label for="authTokenInput">Auth Token</label>
    <input type="password" id="authTokenInput" placeholder="Bearer token" />
    <button id="saveSettingsBtn">Enregistrer</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
